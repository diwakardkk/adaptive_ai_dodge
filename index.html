<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#06050c" />
  <meta name="description" content="Adaptive AI Dodge - a premium neon canvas game with adaptive obstacle spawning, touch drag controls, and vibration feedback." />
  <title>Adaptive AI Dodge</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-shell">
    <canvas id="gameCanvas" aria-label="Adaptive AI Dodge game canvas"></canvas>

    <div class="hud">
      <div class="hud-card">
        <span class="hud-label">Score</span>
        <span id="scoreValue" class="hud-value">0.0</span>
      </div>

      <div class="hud-card">
        <span class="hud-label">Best</span>
        <span id="bestValue" class="hud-value">0.0</span>
      </div>
    </div>

    <div id="startScreen" class="overlay visible">
      <div class="glass-panel hero-panel">
        <div class="eyebrow">Premium Adaptive Arena</div>
        <h1>Adaptive AI Dodge</h1>
        <p class="subtitle">The game learns how you move</p>

        <div class="cta-row">
          <button id="startBtn" class="primary-btn">Start Game</button>
        </div>

        <p id="controlHint" class="hint">Arrow keys to move | P or Space to pause</p>
      </div>
    </div>

    <div id="gameOverScreen" class="overlay">
      <div class="glass-panel hero-panel">
        <div class="eyebrow danger">System Breach</div>
        <h2>Game Over</h2>

        <div class="stats-row">
          <div class="stats-box">
            <span class="hud-label">Score</span>
            <span id="finalScore" class="hud-value">0.0</span>
          </div>
          <div class="stats-box">
            <span class="hud-label">Best</span>
            <span id="finalBest" class="hud-value">0.0</span>
          </div>
        </div>

        <div class="cta-row">
          <button id="restartBtn" class="primary-btn">Restart</button>
        </div>

        <p class="hint">The AI adapts in real time</p>
      </div>
    </div>

    <div id="pauseScreen" class="pause-badge">Paused</div>
    <div id="deviceHint" class="device-hint">Arrow keys / WASD to move</div>

    <div id="touchControls" class="touch-controls" aria-label="Touch controls">
      <div class="touch-controls__group touch-controls__group--left">
        <button class="control-btn" data-control="left" aria-label="Move left">Left</button>
        <button class="control-btn" data-control="right" aria-label="Move right">Right</button>
      </div>

      <div class="touch-controls__group touch-controls__group--right">
        <button class="control-btn" data-control="up" aria-label="Move up">Up</button>
        <button class="control-btn" data-control="down" aria-label="Move down">Down</button>
        <button id="pauseTouchBtn" class="control-btn control-btn--action" aria-label="Pause or resume game">Pause</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
